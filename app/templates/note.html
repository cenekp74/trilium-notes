{% extends "base.html" %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<article class="note-wrapper">
    <header class="note-header">
        <h1 class="note-title">{{ title }}</h1>
    </header>
    <div class="note-body">
        {{ content | safe }}
    </div>
</article>
{% endblock %}
