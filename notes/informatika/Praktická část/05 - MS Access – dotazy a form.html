<html>
  
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../style.css">
    <base target="_parent">
    <title data-trilium-title>05 - MS Access – dotazy a formuláře</title>
  </head>
  
  <body>
    <div class="content">
       <h1 data-trilium-h1>05 - MS Access – dotazy a formuláře</h1>

      <div class="ck-content">
        <section>
          <h2 style="margin-left:0px;"><strong>Dotaz (Query) – výběrový</strong></h2>
          <figure class="table" style="width:438px;">
            <table>
              <tbody>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>1</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Karta <strong>Vytvořit</strong> → <strong>Návrh dotazu</strong>.</td>
                </tr>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>2</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Přidej potřebné tabulky a zavři okno.</td>
                </tr>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>3</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Dvojklikem na pole je přesuneš dolů do mřížky.</td>
                </tr>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>4</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Vyplň <strong>Kritéria</strong> (např. <code>"4.A"</code> u Třída, nebo <code>&gt;3</code> u
                    Známka).</td>
                </tr>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>5</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Vlevo nahoře <strong>Spustit</strong> (✓ vykřičník) nebo přepnout do Zobrazení
                    datového listu.</td>
                </tr>
              </tbody>
            </table>
          </figure>
          <h3 style="margin-left:0px;"><strong>Příklady kritérií</strong></h3>
          <ul>
            <li>
              <p style="margin-left:0px;"><code>"Praha"</code> – přesná shoda</p>
            </li>
            <li>
              <p style="margin-left:0px;"><code>&gt;1500</code> – větší než</p>
            </li>
            <li>
              <p style="margin-left:0px;"><code>Like "A*"</code> – začíná na A</p>
            </li>
            <li>
              <p style="margin-left:0px;"><code>Between 1 And 3</code> – v rozsahu</p>
            </li>
          </ul>
          <h2 style="margin-left:0px;"><strong>Formulář</strong></h2>
          <p style="margin-left:0px;">Slouží k pohodlnému zadávání dat do tabulky.</p>
          <figure class="table"
          style="width:438px;">
            <table>
              <tbody>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>1</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">V navigaci klikni na tabulku, ke které chceš formulář.</td>
                </tr>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>2</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Karta <strong>Vytvořit</strong> → <strong>Průvodce formulářem</strong> (nebo
                    rovnou <strong>Formulář</strong>).</td>
                </tr>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>3</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Vyber pole, layout, styl → Dokončit.</td>
                </tr>
                <tr>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;width:26px;"><strong>4</strong>
                  </td>
                  <td style="border-bottom:1px solid rgb(227, 230, 234);padding:6px 10px;vertical-align:top;">Přepni do <strong>Zobrazení formuláře</strong> a procházej / přidávej záznamy
                    šipkami dole.</td>
                </tr>
              </tbody>
            </table>
          </figure>
        </section>
      </div>
    </div>
  </body>

</html>
